<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Talk Coding</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 24px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 18px; font-weight: 600; color: #fff; }
    #tool-select {
      background: #1a1a1a;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 14px;
      cursor: pointer;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.6;
      font-size: 15px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.ai {
      align-self: flex-start;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-bottom-left-radius: 4px;
    }
    .msg.system {
      align-self: center;
      background: transparent;
      color: #888;
      font-size: 13px;
      padding: 4px;
    }
    .page-link {
      align-self: center;
      display: inline-block;
      margin-top: 8px;
      padding: 12px 32px;
      background: #16a34a;
      color: #fff;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: background 0.2s;
    }
    .page-link:hover { background: #15803d; }
    #controls {
      padding: 16px 24px;
      border-top: 1px solid #222;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    #text-input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 12px 16px;
      color: #e0e0e0;
      font-size: 15px;
      outline: none;
      resize: none;
      font-family: inherit;
    }
    #text-input:focus { border-color: #2563eb; }
    #mic-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: #2563eb;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    #mic-btn.recording { background: #dc2626; animation: pulse 1s infinite; }
    #mic-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    #status {
      text-align: center;
      padding: 4px;
      font-size: 13px;
      color: #888;
      min-height: 24px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Talk Coding</h1>
    <select id="tool-select">
      <option value="claude">Claude Code</option>
      <option value="codex">Codex</option>
      <option value="gemini">Gemini</option>
    </select>
  </header>

  <div id="chat"></div>
  <div id="status"></div>

  <div id="controls">
    <textarea id="text-input" rows="1" placeholder="输入消息或按住麦克风说话..."></textarea>
    <button id="mic-btn" title="按住说话">&#127908;</button>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
